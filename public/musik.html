<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Musik</title>
  <style>
    .video-wrapper {
      display: flex;
      justify-content: center;
      margin: 2rem 1rem;
    }
    .video-wrapper iframe {
      width: 100%;
      max-width: 560px;
      height: 315px;
      border-radius: 10px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.3);
    }
    @media (max-width: 600px) {
      .video-wrapper iframe {
        height: 220px;
      }
    }
  </style>
</head>
<body>
  <header>
    <a href="index.html">
      <img src="V_Beats_Logga.png" alt="VBeats">
    </a>
    <nav class="navbar">
      <a href="musik.html" class="nav-link">Musik</a>
      <a href="omOss.html" class="nav-link">Om oss</a>
      <a href="http://localhost:3001" class="nav-link">Forum</a>
      <div class="nav-spacer"></div>
      <a href="login.html" class="nav-login" id="nav-login-btn">Logga in</a>
    </nav>
  </header>

  <div class="fill"></div>

  <h1>🎶MUSIK🎶</h1>

  <div class="video-wrapper">
    <iframe
      src="https://www.youtube.com/embed/X0-JkBCAc5E"
      title="SNAKE EYES"
      frameborder="0"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
      allowfullscreen>
    </iframe>
  </div>

  <div class="fill"></div>
  <div class="fill-grill"></div>
  <div class="fill-grill"></div>
  <div class="fill-grill"></div>
  <div class="fill-grill"></div>
  <div class="fill-grill"></div>
  <div class="fill-grill"></div>
  <div class="fill-grill"></div>

  <footer>
    <b>Kontakt:</b>&nbsp;info@vbeats.jp
  </footer>

  <script src="/auth.js"></script>
  <script>
    checkLogin().then(user => {
      const btn = document.getElementById('nav-login-btn');
      if (user) {
        btn.textContent = 'Min Profil';
      } else {
        btn.textContent = 'Logga in';
      }
      btn.href = '/login.html';
    });
  </script>
</body>
</html>
