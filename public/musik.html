<script>
  // Hämta besökarantalet från servern och visa det på sidan
  fetch('/visitors')
    .then(res => res.json())
    .then(data => {
      document.getElementById('count').textContent = data.count;
    });

  // Hämtar och visar aktuell tid från servern
  function updateTime() {
    fetch('/datetime')
      .then(res => res.json())
      .then(data => {
        document.getElementById('datetime').textContent = data.datetime;
      });
  }

  updateTime();                    // Kör direkt vid sidladdning
  setInterval(updateTime, 1000);   // Uppdatera tiden varje sekund

  // --- Bildspel ---
  let current = 0; // Index för den aktiva bilden
  const slides = document.querySelectorAll('.slide'); // Alla bildrutor
  const dots = document.querySelectorAll('.dot');     // Alla navigationsprickar

  // Visar bilden med index n och uppdaterar aktiv prick
  const track = document.querySelector('.slides-track');

  function showSlide(n) {
    dots[current].classList.remove('active');
    current = (n + slides.length) % slides.length;
    dots[current].classList.add('active');
    track.style.transform = `translateX(-${current * 100}%)`;
  }

  // Går framåt eller bakåt med +1 eller -1
  function changeSlide(n) {
    showSlide(current + n);
  }

  // Hoppar direkt till en specifik bild via prickarna
  function goToSlide(n) {
    showSlide(n);
  }
</script>
