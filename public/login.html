<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Login</title>
  <script src="/auth.js"></script>
  
</head>
<body>
  <header>
    <a href="index.html">
      <img src="V_Beats_Logga.png" alt="VBeats">
    </a>
    <nav class="navbar">
      <a href="musik.html" class="nav-link">Musik</a>
      <a href="omOss.html" class="nav-link">Om oss</a>
      <a href="http://localhost:3001" class="nav-link">Forum</a>
      <div class="nav-spacer"></div>
    </nav>
  </header>

  <div class="fill"></div>

  <div id="login-form">
    <h4>Login</h4>
    <input id="name" placeholder="Username" />
    <input id="password" type="password" placeholder="Password" />
    <button onclick="login()">Login</button>
    <p id="msg"></p>
    <p>No account? <a href="/register.html">Register here</a></p>
  </div>

  <div id="logged-in" style="display:none;">
    <h4>Welcome, <span id="username"></span>!</h4>
    <button onclick="window.location.href='/index.html'">Go to Home</button>
    <button onclick="logout()">Log Out</button>
  </div>

  <div class="fill"></div>
  <div class="fill-grill"></div>
  <div class="fill-grill"></div>
  <div class="fill-grill"></div>
  <div class="fill-grill"></div>
  <div class="fill-grill"></div>
  <div class="fill-grill"></div>
  <div class="fill-grill"></div>
  <div class="fill-grill"></div>
  <div class="fill-grill"></div>
  <div class="fill-grill"></div>
  <div class="fill-grill"></div>
  <div class="fill-grill"></div>
  <div class="fill-grill"></div>
  <div class="fill-grill"></div>
  <div class="fill-grill"></div>
  
  <footer>
    <b>Kontakt:</b>&nbsp;info@vbeats.jp
  </footer>

  <script>
    checkLogin().then(user => {
      if (user) showLoggedIn(user);
    });

    function showLoggedIn(user) {
      document.getElementById('login-form').style.display = 'none';
      document.getElementById('logged-in').style.display = 'flex';
      document.getElementById('username').textContent = user;
    }

    async function login() {
      const res = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name: document.getElementById('name').value,
          password: document.getElementById('password').value
        })
      });
      const msg = document.getElementById('msg');
      if (res.ok) {
        const data = await res.json();
        showLoggedIn(data.user);
      } else if (res.status === 404) msg.textContent = 'User not found.';
      else if (res.status === 401) msg.textContent = 'Wrong password.';
      else msg.textContent = 'Something went wrong.';
    }
  </script>
</body>
</html>
