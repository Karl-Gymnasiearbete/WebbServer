<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Login</title>
  <script src="/auth.js"></script>
</head>
<body>
  <h2>Login</h2>
  <input id="name" placeholder="Username" /><br/><br/>
  <input id="password" type="password" placeholder="Password" /><br/><br/>
  <button onclick="login()">Login</button>
  <p id="msg"></p>
  <p>No account? <a href="/register.html">Register here</a></p>

  <script>
    checkLogin().then(user => {
      if (user) window.location.href = '/index.html';
    });

    async function login() {
      const res = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name: document.getElementById('name').value,
          password: document.getElementById('password').value
        })
      });
      const msg = document.getElementById('msg');
      if (res.ok) {
        const data = await res.json();
        msg.textContent = `Welcome, ${data.user}!`;
        window.location.href = '/index.html';
      } else if (res.status === 404) msg.textContent = 'User not found.';
      else if (res.status === 401) msg.textContent = 'Wrong password.';
      else msg.textContent = 'Something went wrong.';
    }
  </script>
</body>
</html>
