<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Login</title>
  <script src="/auth.js"></script>
  <style>
    #login-form, #logged-in {
      padding: clamp(1rem, 5vw, 3rem) clamp(1rem, 5vw, 4rem);
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: clamp(0.5rem, 1.5vw, 1rem);
    }
    #login-form h4, #logged-in h4 {
      font-size: clamp(1.8rem, 4vw, 4rem);
      font-weight: 700;
      color: #2B2024;
      margin: 0 0 1rem 0;
    }
    #login-form input {
      width: clamp(180px, 40vw, 18vw);
      padding: clamp(0.4rem, 1vw, 0.6rem) clamp(0.6rem, 1.5vw, 1rem);
      font-size: clamp(0.85rem, 1.5vw, 1rem);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      border: 2px solid #ddd;
      border-radius: 8px;
      outline: none;
      color: #2B2024;
      background-color: #fff;
      transition: border-color 0.2s;
    }
    #login-form input:focus {
      border-color: #FD0054;
    }
    #login-form button, #logged-in button {
      padding: clamp(0.4rem, 1vw, 0.5rem) clamp(1rem, 2vw, 1.5rem);
      font-size: clamp(0.85rem, 1.5vw, 1rem);
      font-weight: 600;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #FD0054;
      color: #FBF9FA;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    #login-form button:hover, #logged-in button:hover {
      background-color: #a80038;
    }
    #login-form p {
      font-size: clamp(0.8rem, 1.5vw, 1rem);
      color: #2B2024;
      padding: 0;
      margin: 0;
    }
    #login-form p a {
      color: #FD0054;
      font-weight: 600;
      text-decoration: none;
      border-bottom: 2px solid #FD0054;
      transition: opacity 0.2s;
    }
    #login-form p a:hover {
      opacity: 0.7;
    }
    #msg {
      color: #FD0054;
      font-size: clamp(0.75rem, 1.2vw, 0.9rem);
      margin: 0;
    }
    @media (max-width: 600px) {
      header {
        max-height: none;
        padding: 0.5rem;
      }
      header img {
        max-width: 60px;
      }
      .nav-link {
        font-size: 0.85rem;
      }
      #login-form input {
        width: 80vw;
      }
    }
  </style>
</head>
<body>
  <header>
    <a href="index.html">
      <img src="V_Beats_Logga.png" alt="VBeats">
    </a>
    <nav class="navbar">
      <a href="musik.html" class="nav-link">Musik</a>
      <a href="omOss.html" class="nav-link">Om oss</a>
      <a href="http://localhost:3001" class="nav-link">Forum</a>
      <div class="nav-spacer"></div>
    </nav>
  </header>

  <div class="fill"></div>

  <div id="login-form">
    <h4>Login</h4>
    <input id="name" placeholder="Username" />
    <input id="password" type="password" placeholder="Password" />
    <button onclick="login()">Login</button>
    <p id="msg"></p>
    <p>No account? <a href="/register.html">Register here</a></p>
  </div>

  <div id="logged-in" style="display:none;">
    <h4>Welcome, <span id="username"></span>!</h4>
    <button onclick="window.location.href='/index.html'">Go to Home</button>
    <button onclick="logout()">Log Out</button>
  </div>

  <footer>
    <b>Kontakt:</b>&nbsp;info@vbeats.jp
  </footer>

  <script>
    checkLogin().then(user => {
      if (user) showLoggedIn(user);
    });

    function showLoggedIn(user) {
      document.getElementById('login-form').style.display = 'none';
      document.getElementById('logged-in').style.display = 'flex';
      document.getElementById('username').textContent = user;
    }

    async function login() {
      const res = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name: document.getElementById('name').value,
          password: document.getElementById('password').value
        })
      });
      const msg = document.getElementById('msg');
      if (res.ok) {
        const data = await res.json();
        showLoggedIn(data.user);
      } else if (res.status === 404) msg.textContent = 'User not found.';
      else if (res.status === 401) msg.textContent = 'Wrong password.';
      else msg.textContent = 'Something went wrong.';
    }
  </script>
</body>
</html>
