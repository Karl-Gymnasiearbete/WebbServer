<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Login</title>
  <script src="/auth.js"></script>
</head>
<body>

  <!-- Shown when NOT logged in -->
  <div id="login-form">
    <h2>Login</h2>
    <input id="name" placeholder="Username" /><br/><br/>
    <input id="password" type="password" placeholder="Password" /><br/><br/>
    <button onclick="login()">Login</button>
    <p id="msg"></p>
    <p>No account? <a href="/register.html">Register here</a></p>
  </div>

  <!-- Shown when logged in -->
  <div id="logged-in" style="display:none;">
    <h2>Welcome, <span id="username"></span>!</h2>
    <br/>
    <button onclick="window.location.href='/index.html'">Go to Home</button>
    <button onclick="logout()">Log Out</button>
  </div>

  <script>
    checkLogin().then(user => {
      if (user) showLoggedIn(user);
    });

    function showLoggedIn(user) {
      document.getElementById('login-form').style.display = 'none';
      document.getElementById('logged-in').style.display = 'block';
      document.getElementById('username').textContent = user;
    }

    async function login() {
      const res = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name: document.getElementById('name').value,
          password: document.getElementById('password').value
        })
      });
      const msg = document.getElementById('msg');
      if (res.ok) {
        const data = await res.json();
        showLoggedIn(data.user);
      } else if (res.status === 404) msg.textContent = 'User not found.';
      else if (res.status === 401) msg.textContent = 'Wrong password.';
      else msg.textContent = 'Something went wrong.';
    }
  </script>
</body>
</html>
