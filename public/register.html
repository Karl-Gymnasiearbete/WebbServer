<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Register</title>
</head>
<body>
  <header>
    <a href="index.html">
      <img src="V_Beats_Logga.png" alt="VBeats">
    </a>
    <nav class="navbar">
      <a href="musik.html" class="nav-link">Musik</a>
      <a href="omOss.html" class="nav-link">Om oss</a>
      <a href="http://localhost:3001" class="nav-link">Forum</a>
      <div class="nav-spacer"></div>
    </nav>
  </header>

  <div class="fill"></div>

  <div id="register-form">
    <h4>Register</h4>
    <input id="name" placeholder="Username" />
    <input id="password" type="password" placeholder="Password" />
    <button onclick="register()">Registrera</button>
    <p id="msg"></p>
    <p>Har du ett konto? <a href="/login.html">Logga in här</a></p>
  </div>

  <div class="fill"></div>
  <div class="fill-grill"></div>
  <div class="fill-grill"></div>
  <div class="fill-grill"></div>
  <div class="fill-grill"></div>
  <div class="fill-grill"></div>
  <div class="fill-grill"></div>
  <div class="fill-grill"></div>
  <div class="fill-grill"></div>
  <div class="fill-grill"></div>
  <div class="fill-grill"></div>
  <div class="fill-grill"></div>
  <div class="fill-grill"></div>
  <div class="fill-grill"></div>
  <div class="fill-grill"></div>
  <div class="fill-grill"></div>

  <footer>
    <b>Kontakt:</b>&nbsp;info@vbeats.jp
  </footer>

  <script>
    async function register() {
      const res = await fetch('/createUser', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name: document.getElementById('name').value,
          password: document.getElementById('password').value
        })
      });
      const msg = document.getElementById('msg');
      if (res.status === 201) {
        msg.textContent = 'Konto skapat! Omdirigerar...';
        setTimeout(() => window.location.href = '/login.html', 1500);
      } else if (res.status === 409) msg.textContent = 'Användarnamnet finns redan.';
      else msg.textContent = 'Något gick fel.';
    }
  </script>
</body>
</html>
