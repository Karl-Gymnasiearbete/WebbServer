<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style.css">
  <title>Register</title>
</head>
<body>

<header>
    <a href="index.html">
      <img src="V_Beats_Logga.png" alt="VBeats">
    </a>
  <nav class="navbar">
    <a href="#" class="nav-link">Musik</a>
    <a href="omOss.html" class="nav-link">Om oss</a>
    <a href="#" class="nav-link">Forum</a>
    <div class="nav-spacer"></div>
  </nav>
</header>

 <div id="register-form">
  <h4>Register</h4>
  <input id="name" placeholder="Username" />
  <input id="password" type="password" placeholder="Password" />
  <button onclick="register()">Registrera</button>
  <p id="msg"></p>
  <p>Login <a href="/login.html">Logga in här</a></p>
</div>
  <script>
    async function register() {
      const res = await fetch('/createUser', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name: document.getElementById('name').value,
          password: document.getElementById('password').value
        })
      });
      const msg = document.getElementById('msg');
      if (res.status === 201) msg.textContent = 'Account created! Go to /login.html';
      else if (res.status === 409) msg.textContent = 'User already exists.';
      else msg.textContent = 'Error creating account.';
    }
  </script>
</body>
</html>
