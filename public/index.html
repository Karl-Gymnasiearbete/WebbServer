<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>My Website</title>
</head>
<body>
  <h1>Hello, Ming!</h1>
  <p>Visitors: <span id="count">...</span></p>
  <p>Date & Time: <span id="datetime">...</span></p>

  <!-- Bildspel -->
 <div class="slideshow">
  <!-- Lägg till en slides-track som wrapper runt alla slides -->
  <div class="slides-track">
    <div class="slide"><img src="Aurora.jpg" alt="Aurora"></div>
    <div class="slide"><img src="Flower 3.jpg" alt="Blomma"></div>
    <div class="slide"><img src="Moonlight.png" alt="Månljus"></div>
    <div class="slide"><img src="Nebula-2.png" alt="Nebulosa"></div>
  </div>
  <button class="prev" onclick="changeSlide(-1)">&#8592;</button>
  <button class="next" onclick="changeSlide(1)">&#8594;</button>
  <div class="dots">
    <span class="dot active" onclick="goToSlide(0)"></span>
    <span class="dot" onclick="goToSlide(1)"></span>
    <span class="dot" onclick="goToSlide(2)"></span>
    <span class="dot" onclick="goToSlide(3)"></span>
  </div>
</div>

<script>
 let current = 0;
const track = document.querySelector('.slides-track'); // Spåret vi förflyttar
const dots = document.querySelectorAll('.dot');
const totalSlides = document.querySelectorAll('.slide').length;

// Förflyttar spåret åt sidan med CSS transform
function showSlide(n) {
  dots[current].classList.remove('active');
  current = (n + totalSlides) % totalSlides; // Loopar runt
  track.style.transform = `translateX(-${current * 100}%)`;
  dots[current].classList.add('active');
}

function changeSlide(n) {
  showSlide(current + n);
}

function goToSlide(n) {
  showSlide(n);
}
</script>
</body>
</html>
