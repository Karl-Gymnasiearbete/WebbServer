<footer>
  <b>Kontakt:</b>&nbsp;vbeats@gmail.com
</footer>

<script>
  // Check login and update nav button
  checkLogin().then(user => {
    const btn = document.getElementById('nav-login-btn');
    if (user) {
      btn.textContent = 'Min Profil';
      btn.href = '/login.html';
    } else {
      btn.textContent = 'Logga in';
      btn.href = '/login.html';
    }
  });

  // Hämta besökarantalet från servern och visa det på sidan
  fetch('/visitors')
    .then(res => res.json())
    .then(data => {
      document.getElementById('count').textContent = data.count;
    });

  // Hämtar och visar aktuell tid från servern
  function updateTime() {
    fetch('/datetime')
      .then(res => res.json())
      .then(data => {
        document.getElementById('datetime').textContent = data.datetime;
      });
  }

  updateTime();
  setInterval(updateTime, 1000);

  // --- Bildspel ---
  let current = 0;
  const slides = document.querySelectorAll('.slide');
  const dots = document.querySelectorAll('.dot');
  const track = document.querySelector('.slides-track');

  function showSlide(n) {
    dots[current].classList.remove('active');
    current = (n + slides.length) % slides.length;
    dots[current].classList.add('active');
    track.style.transform = `translateX(-${current * 100}%)`;
  }

  function changeSlide(n) {
    showSlide(current + n);
  }

  function goToSlide(n) {
    showSlide(n);
  }
</script>
</body>
</html>
