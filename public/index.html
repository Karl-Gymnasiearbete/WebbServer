<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Node.js</title>
</head>
<body>
  <header>
    <img src="Nodejs logo.png" alt="NodejsLogo">
  </header>
  <h1>Node.JS</h1>
  <p>Antal unika besökare: <span id="count">...</span></p>
  <p>Datum och tid: <span id="datetime">...</span></p>

  <!-- Bildspel -->
 <div class="slideshow">
  <!-- Lägg till en slides-track som wrapper runt alla slides -->
  <div class="slides-track">
    <div class="slide"><img src="Aurora.jpg" alt="Aurora"></div>
    <div class="slide"><img src="Flower 3.jpg" alt="Blomma"></div>
    <div class="slide"><img src="Moonlight.png" alt="Månljus"></div>
    <div class="slide"><img src="Nebula-2.png" alt="Nebulosa"></div>
  </div>
  <button class="prev" onclick="changeSlide(-1)">&#8592;</button>
  <button class="next" onclick="changeSlide(1)">&#8594;</button>
  <div class="dots">
    <span class="dot active" onclick="goToSlide(0)"></span>
    <span class="dot" onclick="goToSlide(1)"></span>
    <span class="dot" onclick="goToSlide(2)"></span>
    <span class="dot" onclick="goToSlide(3)"></span>
  </div>
</div>

<script>
  // Hämta besökarantalet från servern och visa det på sidan
  fetch('/visitors')
    .then(res => res.json())
    .then(data => {
      document.getElementById('count').textContent = data.count;
    });

  // Hämtar och visar aktuell tid från servern
  function updateTime() {
    fetch('/datetime')
      .then(res => res.json())
      .then(data => {
        document.getElementById('datetime').textContent = data.datetime;
      });
  }

  updateTime();                    // Kör direkt vid sidladdning
  setInterval(updateTime, 1000);   // Uppdatera tiden varje sekund

  // --- Bildspel ---
  let current = 0; // Index för den aktiva bilden
  const slides = document.querySelectorAll('.slide'); // Alla bildrutor
  const dots = document.querySelectorAll('.dot');     // Alla navigationsprickar

  // Visar bilden med index n och uppdaterar aktiv prick
  const track = document.querySelector('.slides-track');

  function showSlide(n) {
    dots[current].classList.remove('active');
    current = (n + slides.length) % slides.length;
    dots[current].classList.add('active');
    track.style.transform = `translateX(-${current * 100}%)`;
  }

  // Går framåt eller bakåt med +1 eller -1
  function changeSlide(n) {
    showSlide(current + n);
  }

  // Hoppar direkt till en specifik bild via prickarna
  function goToSlide(n) {
    showSlide(n);
  }
</script>
</body>
</html>
